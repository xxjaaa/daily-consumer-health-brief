name: Daily Consumer Health Brief

on:
  # Runs at 9:00 AM Pacific Time (16:00 UTC), every day
  schedule:
    - cron: '0 16 * * *'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Generate feed
        working-directory: scripts
        env:
          PODCAST_INDEX_API_KEY: ${{ secrets.PODCAST_INDEX_API_KEY }}
          PODCAST_INDEX_API_SECRET: ${{ secrets.PODCAST_INDEX_API_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NEWS_LOOKBACK_HOURS: '28'
          BUILDER_LOOKBACK_HOURS: '168'
        run: node generate-feed.js

      - name: Prepare digest
        working-directory: scripts
        run: node prepare-digest.js

      - name: Deliver email
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: node deliver.js

      - name: Commit updated state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update state-feed.json [skip ci]"
          file_pattern: state-feed.json
